<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WAIC 暴雨应急护航 · Rain Alert for WAIC 2026</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script defer src="https://events.vercount.one/js"></script>
<style>
:root{
  --bg-deep:#060912; --bg-base:#0a0e1a; --bg-card:rgba(15,22,38,0.7);
  --border-glow:rgba(0,240,255,0.15); --text-primary:#e8eef7; --text-secondary:#8b95a8;
  --accent-cyan:#00f0ff; --accent-purple:#a855f7; --accent-pink:#ec4899;
  /* 暴雨警示色系（新增，不修改原有变量） */
  --warn-blue:#3b82f6; --warn-yellow:#facc15; --warn-orange:#fb923c; --warn-red:#ef4444; --warn-safe:#4ade80;
}
*{box-sizing:border-box}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg-deep);color:var(--text-primary);margin:0;overflow-x:hidden}
.font-orbitron{font-family:'Orbitron',sans-serif}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:rgba(255,255,255,0.03)}
::-webkit-scrollbar-thumb{background:rgba(0,240,255,0.2);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:rgba(0,240,255,0.4)}

/* Background effects */
.bg-grid{position:fixed;inset:0;background-image:linear-gradient(rgba(0,240,255,0.02) 1px,transparent 1px),linear-gradient(90deg,rgba(0,240,255,0.02) 1px,transparent 1px);background-size:50px 50px;pointer-events:none;z-index:0}
.bg-glow-1{position:fixed;top:-200px;left:-200px;width:600px;height:600px;background:radial-gradient(circle,rgba(0,240,255,0.08) 0%,transparent 70%);pointer-events:none;z-index:0;animation:float1 20s ease-in-out infinite}
.bg-glow-2{position:fixed;bottom:-200px;right:-200px;width:600px;height:600px;background:radial-gradient(circle,rgba(168,85,247,0.08) 0%,transparent 70%);pointer-events:none;z-index:0;animation:float2 25s ease-in-out infinite}
@keyframes float1{0%,100%{transform:translate(0,0)}50%{transform:translate(100px,50px)}}
@keyframes float2{0%,100%{transform:translate(0,0)}50%{transform:translate(-80px,-60px)}}

/* Glass card */
.glass{background:var(--bg-card);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.06);border-radius:16px}
.glass-hover{transition:all .3s cubic-bezier(.4,0,.2,1)}
.glass-hover:hover{border-color:var(--border-glow);box-shadow:0 0 30px rgba(0,240,255,0.08);transform:translateY(-2px)}

/* Neon text */
.neon-cyan{color:var(--accent-cyan);text-shadow:0 0 20px rgba(0,240,255,0.4)}
.neon-purple{color:var(--accent-purple);text-shadow:0 0 20px rgba(168,85,247,0.4)}

/* Track badge */
.track-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 10px;border-radius:999px;font-size:11px;font-weight:500;white-space:nowrap}

/* Event card */
.event-card{position:relative;overflow:hidden;cursor:pointer;transition:all .3s cubic-bezier(.4,0,.2,1)}
.event-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;border-radius:2px}
.event-card:hover{transform:translateY(-3px);box-shadow:0 8px 32px rgba(0,0,0,0.3)}

/* Filter pills */
.filter-pill{padding:6px 16px;border-radius:999px;font-size:13px;font-weight:500;cursor:pointer;transition:all .25s;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.03);color:var(--text-secondary);white-space:nowrap}
.filter-pill:hover{border-color:rgba(0,240,255,0.3);color:var(--text-primary)}
.filter-pill.active{background:rgba(0,240,255,0.12);border-color:rgba(0,240,255,0.4);color:var(--accent-cyan);box-shadow:0 0 15px rgba(0,240,255,0.15)}

/* Track chip */
.track-chip{display:inline-flex;align-items:center;gap:6px;padding:5px 14px;border-radius:999px;font-size:12px;font-weight:500;cursor:pointer;transition:all .25s;border:1px solid rgba(255,255,255,0.06);background:rgba(255,255,255,0.02);color:var(--text-secondary);white-space:nowrap}
.track-chip:hover{color:var(--text-primary);transform:translateY(-1px)}
.track-chip.active{color:var(--text-primary);border-color:var(--chip-color);background:color-mix(in srgb,var(--chip-color) 12%,transparent);box-shadow:0 0 12px color-mix(in srgb,var(--chip-color) 20%,transparent)}
.track-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* Track filter toggle (mobile collapsible) */
.track-toggle{display:none}
.track-filter-body{overflow:visible;max-height:none;opacity:1;transition:max-height .3s ease,opacity .25s ease}

/* View transitions */
.view-section{display:none}
.view-section.active{display:block;animation:fadeIn .4s ease}
.view-section.no-anim{animation:none!important}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(8px);z-index:9999;display:none;align-items:center;justify-content:center;padding:20px}
.modal-overlay.active{display:flex;animation:fadeIn .2s ease}
.modal-content{max-width:560px;width:100%;max-height:85vh;overflow-y:auto;animation:modalSlide .3s cubic-bezier(.4,0,.2,1)}
@keyframes modalSlide{from{opacity:0;transform:scale(0.95) translateY(20px)}to{opacity:1;transform:scale(1) translateY(0)}}

/* Map */
#mapView{height:calc(100vh - 200px);min-height:450px;border-radius:16px;overflow:hidden;z-index:1}
.leaflet-popup-content-wrapper{background:rgba(10,14,26,0.95)!important;backdrop-filter:blur(20px);border:1px solid rgba(0,240,255,0.2)!important;border-radius:12px!important;color:#e8eef7!important;box-shadow:0 8px 32px rgba(0,0,0,0.4)!important}
.leaflet-popup-tip{background:rgba(10,14,26,0.95)!important;border:1px solid rgba(0,240,255,0.2)!important}
.leaflet-container{background:#0a0e1a!important}
.leaflet-tile{opacity:0;transition:opacity .25s ease-in;filter:invert(1) hue-rotate(180deg) brightness(0.55) contrast(1.1) saturate(0.6)!important}
.leaflet-tile-loaded{opacity:1}
.custom-pin{background:transparent;border:none}
.pin-icon{display:flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);box-shadow:0 2px 8px rgba(0,0,0,0.4);border:2px solid rgba(255,255,255,0.3);transition:all .3s}
.pin-icon:hover{transform:rotate(-45deg) scale(1.2);z-index:1000}
.pin-text{transform:rotate(45deg);font-size:13px;font-weight:700;color:#fff}
.venue-label{position:absolute;bottom:-22px;left:50%;transform:translateX(-50%);white-space:nowrap;font-size:11px;font-weight:600;color:#e8eef7;background:rgba(10,14,26,0.85);padding:2px 8px;border-radius:6px;border:1px solid rgba(255,255,255,0.1);pointer-events:none;backdrop-filter:blur(4px)}

/* Visitor counter */
.counter-widget{border-color:rgba(0,240,255,0.1)!important;transition:all .3s ease}
.counter-widget:hover{border-color:rgba(0,240,255,0.25)!important;box-shadow:0 0 30px rgba(0,240,255,0.08)}
#vercount_value_site_pv,#vercount_value_site_uv{transition:opacity .3s ease}

/* Timeline */
.timeline-container{position:relative}
.timeline-line{position:absolute;left:70px;top:0;bottom:0;width:2px;background:linear-gradient(to bottom,transparent,rgba(0,240,255,0.15),rgba(0,240,255,0.15),transparent)}
.time-marker{position:absolute;left:0;width:60px;text-align:right;font-size:11px;color:var(--text-secondary);font-family:'Orbitron',monospace}

/* Stat card */
.stat-card{position:relative;overflow:hidden}
.stat-card::after{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.03),transparent);transition:left .6s}
.stat-card:hover::after{left:100%}

/* Search input */
.search-input{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:10px 16px 10px 42px;color:var(--text-primary);width:100%;font-size:14px;transition:all .25s}
.search-input:focus{outline:none;border-color:rgba(0,240,255,0.4);box-shadow:0 0 20px rgba(0,240,255,0.08)}
.search-input::placeholder{color:var(--text-secondary)}

/* Favorite star */
.fav-btn{transition:all .2s;cursor:pointer}
.fav-btn:hover{transform:scale(1.2)}
.fav-active{color:#fbbf24;text-shadow:0 0 10px rgba(251,191,36,0.5)}

/* Nav button */
.nav-btn{padding:8px 20px;border-radius:10px;font-size:14px;font-weight:500;cursor:pointer;transition:all .25s;color:var(--text-secondary);border:1px solid transparent;white-space:nowrap}

/* Mobile responsive */
@media(max-width:768px){
  .hero-stats{grid-template-columns:repeat(2,1fr)!important;gap:8px!important}
  .hero-stats .stat-card{padding:10px 6px!important}
  .hero-stats .font-orbitron{font-size:1.5rem!important}
  .hero-stats .text-xs{font-size:10px!important}
  h1.font-orbitron{font-size:2.5rem!important;letter-spacing:1px!important}
  .text-lg{font-size:1rem!important}
  .text-xs.tracking-wider{font-size:9px!important;letter-spacing:1px!important}
  /* Nav: wrap with full-width sections */
  .nav-bar{flex-wrap:wrap!important;gap:6px!important}
  .nav-bar > .flex.items-center:first-child{width:100%;flex-wrap:nowrap;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch}
  .nav-bar > .flex.items-center:first-child::-webkit-scrollbar{display:none}
  .nav-btn{padding:7px 14px;font-size:13px;flex-shrink:0}
  /* Search full width on its own line */
  .nav-bar > .relative{min-width:100%!important;max-width:100%!important;width:100%!important}
  .search-input{padding:9px 14px 9px 38px;font-size:13px}
  /* Date filters scrollable */
  .nav-bar > .flex.items-center:last-child{width:100%;flex-wrap:nowrap;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch}
  .nav-bar > .flex.items-center:last-child::-webkit-scrollbar{display:none}
  .filter-pill{padding:5px 12px;font-size:12px;flex-shrink:0}
  /* Track filters: collapsible on mobile */
  .track-toggle{display:flex;align-items:center;justify-content:space-between;width:100%;padding:8px 14px;border-radius:10px;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.03);color:var(--text-primary);font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;gap:8px}
  .track-toggle:active{background:rgba(0,240,255,0.06)}
  .track-toggle-label{flex-shrink:0}
  .track-toggle-status{flex:1;text-align:right;font-size:12px;font-weight:400;color:var(--accent-cyan);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .track-toggle-chevron{width:16px;height:16px;flex-shrink:0;transition:transform .3s ease;color:var(--text-secondary)}
  .track-toggle.expanded .track-toggle-chevron{transform:rotate(180deg)}
  .track-filter-body{max-height:0;opacity:0;overflow:hidden;transition:max-height .35s ease,opacity .2s ease,margin-top .2s ease;margin-top:0}
  .track-filter-body.expanded{max-height:500px;opacity:1;margin-top:8px}
  #trackFilters{flex-wrap:wrap!important;gap:6px!important}
  .track-chip{flex-shrink:0;padding:5px 10px;font-size:11px}
  /* Timeline adjustments */
  .timeline-line{left:50px}
  .time-marker{width:42px;font-size:10px}
  /* Map: fixed pixel height for mobile to prevent vh resize issues */
  #mapView{height:500px!important;min-height:500px!important;border-radius:12px}
  /* Modal: full screen on mobile */
  .modal-overlay{padding:0!important;align-items:flex-end!important}
  .modal-content{max-width:100%!important;max-height:90vh!important;border-radius:20px 20px 0 0!important;animation:modalSlideUp .35s cubic-bezier(.4,0,.2,1)}
  @keyframes modalSlideUp{from{opacity:0;transform:translateY(100%)}to{opacity:1;transform:translateY(0)}}
  /* Track cards: single column */
  #tracksContent{grid-template-columns:1fr!important}
  /* Event detail grid: single column */
  .modal-content .grid-cols-2{grid-template-columns:1fr!important}
  /* Section padding */
  main{padding:12px 12px!important}
  section.relative{padding:16px 12px 8px!important}
  nav.sticky{padding:8px 12px!important}
  /* Section titles */
  section h2{font-size:1.05rem!important}
  /* Venue label on map */
  .venue-label{font-size:10px!important;padding:2px 6px!important}
  /* Counter: compact on mobile */
  .counter-widget{gap:12px!important;padding:8px 16px!important}
}
@media(max-width:380px){
  .hero-stats .font-orbitron{font-size:1.25rem!important}
  .nav-btn{padding:6px 10px;font-size:12px}
}

/* ===== 暴雨应急：预警横幅 ===== */
.warning-banner{position:sticky;top:0;z-index:100;padding:12px 20px;text-align:center;font-weight:600;font-size:14px;transition:all .3s;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);cursor:pointer}
.warning-banner.safe{background:rgba(74,222,128,0.12);border-bottom:1px solid rgba(74,222,128,0.3);color:#4ade80}
.warning-banner.yellow{background:rgba(250,204,21,0.15);border-bottom:1px solid rgba(250,204,21,0.4);color:#facc15}
.warning-banner.orange{background:rgba(251,146,60,0.18);border-bottom:1px solid rgba(251,146,60,0.5);color:#fb923c;animation:pulseWarn 2s ease-in-out infinite}
.warning-banner.red{background:rgba(239,68,68,0.2);border-bottom:1px solid rgba(239,68,68,0.6);color:#ef4444;animation:pulseWarn 1.2s ease-in-out infinite}
.warning-banner.loading{background:rgba(0,240,255,0.08);border-bottom:1px solid rgba(0,240,255,0.2);color:var(--accent-cyan)}
@keyframes pulseWarn{0%,100%{box-shadow:inset 0 0 0 rgba(239,68,68,0)}50%{box-shadow:inset 0 0 40px rgba(239,68,68,0.25)}}
.warning-banner .dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:currentColor;box-shadow:0 0 8px currentColor;animation:blink 1.5s ease-in-out infinite;vertical-align:middle;margin-right:8px}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.4}}
.warning-banner-text{display:inline-flex;align-items:center}
.warning-banner-detail{font-size:12px;font-weight:400;opacity:0.85;margin-top:4px;line-height:1.4;max-width:680px;margin-left:auto;margin-right:auto}

/* ===== 上报 FAB 按钮 ===== */
.fab-btn{position:fixed;right:20px;bottom:24px;z-index:90;width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,#ef4444,#fb923c);border:none;color:#fff;font-size:24px;cursor:pointer;box-shadow:0 6px 20px rgba(239,68,68,0.4);display:flex;align-items:center;justify-content:center;transition:transform .3s;animation:fabPulse 2.5s ease-in-out infinite}
.fab-btn:hover{transform:scale(1.1)}
.fab-btn:active{transform:scale(0.95)}
@keyframes fabPulse{0%,100%{box-shadow:0 6px 20px rgba(239,68,68,0.4)}50%{box-shadow:0 6px 28px rgba(239,68,68,0.6)}}

/* ===== 积水图钉 ===== */
.waterlogging-pin{display:flex;align-items:center;justify-content:center;width:30px;height:30px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);border:2px solid rgba(255,255,255,0.5);box-shadow:0 2px 8px rgba(0,0,0,0.5)}
.waterlogging-pin.heavy{background:#ef4444;animation:pinPulse 1s ease-in-out infinite}
.waterlogging-pin.medium{background:#fb923c;animation:pinPulse 1.8s ease-in-out infinite}
.waterlogging-pin.light{background:#facc15}
@keyframes pinPulse{0%,100%{box-shadow:0 2px 8px rgba(0,0,0,0.5),0 0 0 0 rgba(239,68,68,0.5)}50%{box-shadow:0 2px 8px rgba(0,0,0,0.5),0 0 0 12px rgba(239,68,68,0)}}
.waterlogging-pin-text{transform:rotate(45deg);font-size:13px;font-weight:700;color:#fff}

/* ===== 议程应急联动卡片 ===== */
.agenda-alert{background:var(--bg-card);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(0,240,255,0.12);border-radius:16px;padding:16px;margin-bottom:16px;position:relative;overflow:hidden}
.agenda-alert::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:linear-gradient(to bottom,#00f0ff,#a855f7)}
.agenda-alert.warn::before{background:linear-gradient(to bottom,#fb923c,#ef4444)}
.agenda-alert-title{font-size:11px;color:var(--text-secondary);margin-bottom:8px;letter-spacing:1px;text-transform:uppercase;font-weight:600}
.agenda-alert-event{font-size:15px;font-weight:600;color:var(--text-primary);margin-bottom:4px;line-height:1.4}
.agenda-alert-time{font-size:13px;color:var(--accent-cyan);font-family:'Orbitron',monospace;margin-bottom:8px}
.agenda-alert-suggestion{font-size:13px;color:#fbbf24;background:rgba(251,191,36,0.08);padding:8px 12px;border-radius:8px;border-left:3px solid #fbbf24;line-height:1.5}

/* ===== 上报表单 ===== */
.report-field{margin-bottom:14px}
.report-label{display:block;font-size:13px;color:var(--text-secondary);margin-bottom:6px;font-weight:500}
.report-input,.report-textarea{width:100%;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:10px 12px;color:var(--text-primary);font-size:14px;font-family:inherit;transition:all .2s}
.report-input:focus,.report-textarea:focus{outline:none;border-color:rgba(239,68,68,0.4);box-shadow:0 0 0 3px rgba(239,68,68,0.1)}
.report-textarea{resize:vertical;min-height:60px}
.severity-options{display:flex;gap:8px}
.severity-option{flex:1;padding:10px;border-radius:10px;border:2px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.03);text-align:center;cursor:pointer;transition:all .2s;font-size:13px;color:var(--text-secondary)}
.severity-option.active.light{border-color:#facc15;background:rgba(250,204,21,0.12);color:#facc15}
.severity-option.active.medium{border-color:#fb923c;background:rgba(251,146,60,0.12);color:#fb923c}
.severity-option.active.heavy{border-color:#ef4444;background:rgba(239,68,68,0.12);color:#ef4444}
.report-submit{width:100%;padding:12px;border-radius:12px;background:linear-gradient(135deg,#ef4444,#fb923c);color:#fff;border:none;font-size:15px;font-weight:600;cursor:pointer;transition:all .2s;margin-top:8px}
.report-submit:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(239,68,68,0.35)}
.report-submit:disabled{opacity:0.5;cursor:not-allowed;transform:none}
.report-photo-preview{width:100%;max-height:160px;object-fit:cover;border-radius:10px;margin-top:8px}
.location-btn{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:10px;border-radius:10px;border:1px dashed rgba(0,240,255,0.3);background:rgba(0,240,255,0.04);color:var(--accent-cyan);cursor:pointer;font-size:13px;transition:all .2s}
.location-btn:hover{background:rgba(0,240,255,0.08);border-color:rgba(0,240,255,0.5)}

/* ===== 通知开启按钮 ===== */
.notify-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 18px;border-radius:999px;background:rgba(0,240,255,0.1);border:1px solid rgba(0,240,255,0.3);color:var(--accent-cyan);font-size:13px;font-weight:500;cursor:pointer;transition:all .2s}
.notify-btn:hover{background:rgba(0,240,255,0.18);box-shadow:0 0 20px rgba(0,240,255,0.15)}
.notify-btn.granted{background:rgba(74,222,128,0.12);border-color:rgba(74,222,128,0.4);color:#4ade80}

/* ===== 积水列表项 ===== */
.waterlogging-item{display:flex;align-items:center;gap:12px;padding:12px;background:var(--bg-card);border-radius:12px;border:1px solid rgba(255,255,255,0.06);margin-bottom:8px;cursor:pointer;transition:all .2s}
.waterlogging-item:hover{border-color:rgba(239,68,68,0.2);transform:translateX(4px)}
.wl-severity-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.wl-severity-dot.heavy{background:#ef4444;box-shadow:0 0 8px #ef444480}
.wl-severity-dot.medium{background:#fb923c;box-shadow:0 0 8px #fb923c80}
.wl-severity-dot.light{background:#facc15;box-shadow:0 0 8px #facc1580}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-glow-1"></div>
<div class="bg-glow-2"></div>

<!-- 预警横幅 -->
<div id="warningBanner" class="warning-banner loading">
  <span class="dot"></span><span class="warning-banner-text">正在获取预警信息…</span>
</div>

<!-- Hero Section -->
<section class="relative z-10 px-6 pt-10 pb-6 text-center">
  <div class="inline-block mb-2 px-4 py-1 rounded-full glass" style="border-color:rgba(0,240,255,0.2)">
    <span class="text-xs font-medium tracking-wider" style="color:var(--accent-cyan)">2026 WORLD ARTIFICIAL INTELLIGENCE CONFERENCE</span>

const events = APP_DATA.events;
const tracks = APP_DATA.tracks;
const venues = APP_DATA.venues;
const otherVenueCoords = APP_DATA.otherVenueCoords;
const trackColors = APP_DATA.trackColors;

// ===== STATE =====
let currentView = 'timeline';
let currentDateFilter = 'all';
let activeTracks = new Set();
let searchQuery = '';
let favorites = new Set(JSON.parse(localStorage.getItem('waic_favs') || '[]'));
let leafletMap = null;
let mapInitialized = false;

// ===== UTILS =====
function getTrackColor(track) { return trackColors[track] || '#888'; }

function escapeHtml(s) {
  if(!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function timeToMinutes(t) {
  if(!t) return 0;
  const parts = t.split(':');
  return parseInt(parts[0]) * 60 + parseInt(parts[1]);
}

function getEventCoords(event) {
  if(event.venue === '其他场馆' && otherVenueCoords[event.id]) {
    return otherVenueCoords[event.id];
  }
  const v = venues[event.venue];
  return v ? {lat: v.lat, lng: v.lng, name: event.venue} : null;
}

// ===== FILTERING =====
function getFilteredEvents() {
  return events.filter(e => {
    if(currentDateFilter !== 'all' && e.date !== currentDateFilter) return false;
    if(activeTracks.size > 0 && !activeTracks.has(e.track)) return false;
    if(searchQuery) {
      const q = searchQuery.toLowerCase();
      const haystack = (e.name_cn + ' ' + e.name_en + ' ' + e.track + ' ' + e.venue + ' ' + e.location_cn).toLowerCase();
      if(!haystack.includes(q)) return false;
    }
    return true;
  });
}

// ===== RENDER: TIMELINE =====
function renderTimeline() {
  const filtered = getFilteredEvents();
  const container = document.getElementById('timelineContent');
  document.getElementById('timelineCount').textContent = `共 ${filtered.length} 场`;

  if(filtered.length === 0) {
    container.innerHTML = '<div class="glass p-8 text-center" style="color:var(--text-secondary)">没有找到匹配的活动，试试调整筛选条件</div>';
    return;
  }

  // Group by date
  const dates = ['7月17日','7月18日','7月19日','7月20日'];
  let html = '';

  dates.forEach(date => {
    const dayEvents = filtered.filter(e => e.date === date).sort((a,b) => {
      return timeToMinutes(a.time_start) - timeToMinutes(b.time_start);
    });
    if(dayEvents.length === 0) return;

    html += `<div class="mb-8">`;
    html += `<div class="flex items-center gap-3 mb-4">
      <div class="font-orbitron text-lg font-bold" style="color:var(--accent-cyan)">${date.replace('7月','7/').replace('日','')}</div>
      <div class="h-px flex-1" style="background:linear-gradient(to right,rgba(0,240,255,0.2),transparent)"></div>
      <span class="text-sm" style="color:var(--text-secondary)">${dayEvents.length} 场</span>
    </div>`;

    // Render events as cards
    html += '<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3">';
    dayEvents.forEach(e => {
      const color = getTrackColor(e.track);
      const isFav = favorites.has(e.id);
      html += `<div class="event-card glass glass-hover p-4" style="--card-color:${color}" onclick="showEventDetail(${e.id})">
        <div style="position:absolute;left:0;top:0;bottom:0;width:4px;background:${color};border-radius:2px"></div>
        <div class="flex items-start justify-between gap-2 mb-2">
          <div class="flex items-center gap-2">
            <span class="font-orbitron text-sm font-bold" style="color:${color}">${e.time_start || ''}</span>
            <span class="text-xs" style="color:var(--text-secondary)">${e.time_start && e.time_end ? '→ ' + e.time_end : ''}</span>
          </div>
          <span class="fav-btn ${isFav ? 'fav-active' : ''}" onclick="event.stopPropagation();toggleFav(${e.id})" style="color:${isFav ? '#fbbf24' : 'var(--text-secondary)'}">
            <svg class="w-4 h-4" fill="${isFav ? 'currentColor' : 'none'}" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z"/></svg>
          </span>
        </div>
        <div class="text-sm font-medium mb-2" style="color:var(--text-primary);line-height:1.4">${escapeHtml(e.name_cn)}</div>
        <div class="flex items-center gap-2 flex-wrap">
          <span class="track-badge" style="background:${color}1a;color:${color};border:1px solid ${color}33">${e.track}</span>
          <span class="text-xs" style="color:var(--text-secondary)">📍 ${escapeHtml(e.venue)}</span>
        </div>
      </div>`;
    });
    html += '</div></div>';
  });

  container.innerHTML = html;
}

// ===== RENDER: MAP =====
let mapResizeObserver = null;

function renderMap() {
  if(!mapInitialized) {
    // Delay initialization to ensure container has correct dimensions after display:block
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        initMap();
      });
    });
  } else {
    if(leafletMap) leafletMap.invalidateSize();
  }
}

    setTimeout(() => initMap(), 100);

        `<div style="padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.05);cursor:pointer" onclick="showEventDetail(${e.id})">

      const moreText = evts.length > 8 ? `<div style="text-align:center;padding:6px;color:#8b95a8;font-size:12px">还有 ${evts.length-8} 场活动...</div>` : '';

      marker.bindPopup(`

          <div style="font-size:16px;font-weight:700;color:${v.color};margin-bottom:2px">${venueName}</div>
          <div style="font-size:11px;color:#8b95a8;margin-bottom:8px">${escapeHtml(v.address)}</div>
          <div style="font-size:12px;color:#8b95a8;margin-bottom:6px">共 ${evts.length} 场活动</div>
          ${eventList}${moreText}
        </div>
      `, {maxWidth:320});
    });

    // Add other venue markers
    Object.entries(otherVenueCoords).forEach(([id, coord]) => {
      const event = events.find(e => e.id === parseInt(id));
      if(!event) return;
      allBounds.push([coord.lat, coord.lng]);

      const color = getTrackColor(event.track);
      const shortName = coord.name.length > 6 ? coord.name.slice(0,5)+'…' : coord.name;
      const icon = L.divIcon({
        className:'custom-pin',
        html:`<div style="position:relative"><div class="pin-icon" style="background:${color};width:28px;height:28px"><span class="pin-text" style="font-size:10px">1</span></div><div class="venue-label">${shortName}</div></div>`,
        iconSize:[28,28], iconAnchor:[14,28], popupAnchor:[0,-28]
      });

      const marker = L.marker([coord.lat,coord.lng],{icon}).addTo(leafletMap);
      marker.bindPopup(`
        <div style="min-width:240px">
          <div style="font-size:15px;font-weight:700;color:${color};margin-bottom:2px">${escapeHtml(coord.name)}</div>
          <div style="font-size:11px;color:#8b95a8;margin-bottom:8px">${escapeHtml(event.location_cn)}</div>
          <div style="padding:6px 0;cursor:pointer" onclick="showEventDetail(${event.id})">
            <div style="font-size:12px;color:${color};font-weight:600">${event.time_start} - ${event.time_end}</div>
            <div style="font-size:13px;color:#e8eef7;margin-top:2px">${escapeHtml(event.name_cn)}</div>
          </div>
        </div>
      `, {maxWidth:280});
    });

    // Fit bounds to show all markers
    if(allBounds.length > 0) {
      leafletMap.fitBounds(allBounds, {padding:[50,50], maxZoom:14});
    }

    // ResizeObserver to catch container size changes (mobile address bar, orientation change, etc.)
    if(mapResizeObserver) mapResizeObserver.disconnect();
    mapResizeObserver = new ResizeObserver(() => {
      if(leafletMap) leafletMap.invalidateSize();
    });
    mapResizeObserver.observe(mapContainer);

  // One final invalidateSize after layout settles
  setTimeout(() => { if(leafletMap) leafletMap.invalidateSize(); }, 300);
  // 暴雨应急：地图初始化后加载避雨点
  loadShelters();
}

// ===== FILTER BY TRACK =====
function filterByTrack(trackName) {
  if(activeTracks.has(trackName)) {
    activeTracks.delete(trackName);
  } else {
    activeTracks.add(trackName);
  }
  updateTrackFilters();
  collapseTrackFilter();
  if(currentView !== 'timeline' && currentView !== 'map') switchView('timeline');
  else if(currentView === 'timeline') renderTimeline();
}

function clearTracks() {
  activeTracks.clear();
  updateTrackFilters();
  collapseTrackFilter();
  if(currentView === 'timeline') renderTimeline();
}

// ===== VIEW SWITCHING =====
function switchView(viewName) {
  currentView = viewName;
  document.querySelectorAll('.nav-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.view === viewName);
  });
  document.querySelectorAll('.view-section').forEach(section => {
    section.classList.remove('active', 'no-anim');
  });
  const viewMap = {timeline:'timelineView', map:'mapViewSection', tracks:'tracksView', schedule:'scheduleView'};
  const targetSection = document.getElementById(viewMap[viewName]);
  
  if(viewName === 'map') {
    // Disable animation for map view to prevent dimension changes during init
    targetSection.classList.add('no-anim');
    targetSection.classList.add('active');
    renderMap();
    // Extra invalidateSize after layout settles
    setTimeout(() => { if(leafletMap) leafletMap.invalidateSize(); }, 500);
  } else {
    targetSection.classList.add('active');
  }
  if(viewName === 'tracks') renderTracks();
  if(viewName === 'schedule') renderSchedule();
  if(viewName === 'timeline') renderTimeline();
}

// ===== 暴雨应急：预警层 =====
let currentWarningLevel = null;
let weatherPollTimer = null;
const WEATHER_POLL_INTERVAL = 5 * 60 * 1000;

function fetchWeatherWarning() {
  fetch('/api/weather')
    .then(r => r.json())
    .then(data => {
      const warnings = normalizeWarnings(data);
      renderWarningBanner(warnings);
      checkNewWarning(warnings);
      renderAgendaAlert();
    })
    .catch(err => {
      console.warn('获取预警失败:', err);
      // 本地预览 mock（部署到 Netlify 后用真实 API，hostname 不是 localhost 不触发）
      if (location.hostname === 'localhost' || location.hostname === '127.0.0.1') {
        const mockData = { warning: [{ id:'mock1', title:'上海暴雨橙色预警信号', level:'ORANGE', text:'预计未来3小时内上海将出现强降水，累积降水量可达50毫米以上，请注意防范', pubTime:new Date().toISOString(), typeName:'暴雨' }] };
        const warnings = normalizeWarnings(mockData);
        renderWarningBanner(warnings);
        renderAgendaAlert();
        return;
      }
      const banner = document.getElementById('warningBanner');
      if (banner) {
        banner.className = 'warning-banner loading';
        banner.innerHTML = '<span class="dot"></span><span class="warning-banner-text">预警信息获取失败，点击重试</span>';
        banner.onclick = fetchWeatherWarning;
      }
    });
}

function normalizeWarnings(data) {
  const list = data.warning || data.alerts || [];
  return list.map(w => ({
    id: w.id || (w.title || '') + (w.pubTime || ''),
    title: w.title || w.headline || '预警',
    level: (w.level || (w.color && w.color.code) || '').toUpperCase(),
    text: w.text || w.description || '',
    pubTime: w.pubTime || w.issuedTime || '',
    typeName: w.typeName || (w.eventType && w.eventType.name) || ''
  }));
}

function renderWarningBanner(warnings) {
  const banner = document.getElementById('warningBanner');
  if (!banner) return;
  if (!warnings || warnings.length === 0) {
    banner.className = 'warning-banner safe';
    currentWarningLevel = null;
    banner.innerHTML = '<span class="warning-banner-text">当前上海无暴雨预警 · 出行安全</span>';
    banner.onclick = null;
    return;
  }
  const levelPriority = { RED:4, ORANGE:3, YELLOW:2, BLUE:1 };
  const top = warnings.reduce((a, b) => (levelPriority[a.level]||0) >= (levelPriority[b.level]||0) ? a : b);
  currentWarningLevel = top.level;
  banner.className = 'warning-banner ' + top.level.toLowerCase();
  const levelText = { RED:'红色', ORANGE:'橙色', YELLOW:'黄色', BLUE:'蓝色' }[top.level] || '';
  const typeName = top.typeName || '暴雨';
  banner.innerHTML = '<div><span class="dot"></span><span class="warning-banner-text">上海' + typeName + levelText + '预警</span></div>'
    + '<div class="warning-banner-detail">' + (top.text || top.title) + '</div>';
  banner.onclick = () => { if(currentView !== 'map') switchView('map'); };
}

function checkNewWarning(warnings) {
  if (!warnings || warnings.length === 0) { localStorage.removeItem('last_warning_id'); return; }
  const top = warnings[0];
  const lastId = localStorage.getItem('last_warning_id');
  if (top.id && top.id !== lastId) {
    localStorage.setItem('last_warning_id', top.id);
    showNotification(top);
  }
}

function showNotification(warning) {
  if (!('Notification' in window)) return;
  if (Notification.permission !== 'granted') return;
  if (localStorage.getItem('notification_enabled') !== 'true') return;
  const levelText = { RED:'红色', ORANGE:'橙色', YELLOW:'黄色', BLUE:'蓝色' }[warning.level] || '';
  try {
    new Notification(warning.typeName + levelText + '预警', { body: warning.text || warning.title, tag: warning.id });
  } catch(e) { console.warn('通知失败:', e); }
}

function requestNotificationPermission() {
  if (!('Notification' in window)) { alert('您的浏览器不支持通知功能，请保持应用在前台查看预警横幅'); return; }
  const btn = document.getElementById('notifyBtn');
  const btnText = document.getElementById('notifyBtnText');
  if (Notification.permission === 'granted') {
    localStorage.setItem('notification_enabled', 'true');
    btn.classList.add('granted'); btnText.textContent = '通知已开启';
    return;
  }
  Notification.requestPermission().then(result => {
    if (result === 'granted') {
      localStorage.setItem('notification_enabled', 'true');
      btn.classList.add('granted'); btnText.textContent = '通知已开启';
    } else {
      alert('通知被拒绝，请保持应用在前台查看预警横幅');
    }
  });
}

function restoreNotifyState() {
  const btn = document.getElementById('notifyBtn');
  const btnText = document.getElementById('notifyBtnText');
  if (btn && btnText && 'Notification' in window && Notification.permission === 'granted' && localStorage.getItem('notification_enabled') === 'true') {
    btn.classList.add('granted'); btnText.textContent = '通知已开启';
  }
}

function startWarningPolling() {
  fetchWeatherWarning();
  restoreNotifyState();
  if (weatherPollTimer) clearInterval(weatherPollTimer);
  weatherPollTimer = setInterval(fetchWeatherWarning, WEATHER_POLL_INTERVAL);
  document.addEventListener('visibilitychange', () => { if (!document.hidden) fetchWeatherWarning(); });
}

      iconSize: [30, 30], iconAnchor: [15, 30], popupAnchor: [0, -30]
    });
    const marker = L.marker([rep.lat, rep.lng], { icon }).addTo(leafletMap);
    const sevText = { heavy: '重度积水', medium: '中度积水', light: '轻度积水' }[sev] || '积水';
    const photoHtml = rep.photoUrl ? '<img src="' + rep.photoUrl + '" style="width:100%;max-height:120px;object-fit:cover;border-radius:8px;margin-top:6px">' : '';
    marker.bindPopup(
      '<div style="min-width:220px"><div style="font-size:14px;font-weight:700;color:#ef4444;margin-bottom:4px">' + sevText + '</div>'
      + '<div style="font-size:12px;color:#8b95a8;margin-bottom:6px">' + (rep.time || '') + '</div>'
      + (rep.description ? '<div style="font-size:13px;color:#e8eef7;margin-bottom:6px">' + escapeHtml(rep.description) + '</div>' : '')
      + photoHtml + '</div>',
      { maxWidth: 280 }
    );
    waterloggingMarkers.push(marker);
  });
}

function openReportModal() {
  document.getElementById('reportModal').classList.add('active');
  if (leafletMap) {
    leafletMap.on('click', onMapClickForReport);
    document.getElementById('locationResult').textContent = '在地图上点击选择位置';
  }
}

function onMapClickForReport(e) {
  reportLocation = { lat: e.latlng.lat, lng: e.latlng.lng };
  document.getElementById('locationResult').textContent = '已选位置: ' + reportLocation.lat.toFixed(4) + ', ' + reportLocation.lng.toFixed(4);
}

function closeReportModal() {
  document.getElementById('reportModal').classList.remove('active');
  if (leafletMap) leafletMap.off('click', onMapClickForReport);
  reportSeverity = null; reportLocation = null; reportPhotoData = null;
  document.querySelectorAll('.severity-option').forEach(o => o.classList.remove('active'));
  document.getElementById('reportDesc').value = '';
  document.getElementById('reportPhoto').value = '';
  document.getElementById('photoPreview').style.display = 'none';
  document.getElementById('locationResult').textContent = '或直接在地图上点击选择位置';
}

function selectSeverity(sev) {
  reportSeverity = sev;
  document.querySelectorAll('.severity-option').forEach(o => o.classList.toggle('active', o.dataset.severity === sev));
}

function useMyLocation() {
  if (!navigator.geolocation) { alert('您的浏览器不支持定位'); return; }
  document.getElementById('locationText').textContent = '定位中…';
  navigator.geolocation.getCurrentPosition(pos => {
    reportLocation = { lat: pos.coords.latitude, lng: pos.coords.longitude };
    document.getElementById('locationText').textContent = '使用我的定位';
    document.getElementById('locationResult').textContent = '已定位: ' + reportLocation.lat.toFixed(4) + ', ' + reportLocation.lng.toFixed(4);
    if (leafletMap) leafletMap.setView([reportLocation.lat, reportLocation.lng], 15);
  }, () => {
    document.getElementById('locationText').textContent = '使用我的定位';
    alert('定位失败，请在地图上点选位置');
  });
}

function previewPhoto(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      const maxW = 800, maxH = 800;
      let w = img.width, h = img.height;
      if (w > maxW) { h = h * maxW / w; w = maxW; }
      if (h > maxH) { w = w * maxH / h; h = maxH; }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      reportPhotoData = canvas.toDataURL('image/jpeg', 0.6);
      const preview = document.getElementById('photoPreview');
      preview.src = reportPhotoData;
      preview.style.display = 'block';
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function submitReport() {
  if (!reportLocation) { alert('请选择积水位置（定位或地图点选）'); return; }
  if (!reportSeverity) { alert('请选择严重程度'); return; }
  const btn = document.getElementById('reportSubmitBtn');
  btn.disabled = true; btn.textContent = '提交中…';
  const body = {
    lat: reportLocation.lat, lng: reportLocation.lng,
    severity: reportSeverity,
    description: document.getElementById('reportDesc').value.trim()
  };
  if (reportPhotoData) body.photoBase64 = reportPhotoData;
  fetch('/api/waterlogging', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  })
    .then(r => r.json())
    .then(data => {
      if (data.error) throw new Error(data.error);
      closeReportModal();
      loadWaterloggingReports();
      btn.disabled = false; btn.textContent = '提交上报';
      showToast('上报成功！感谢你的贡献');
    })
    .catch(err => {
      btn.disabled = false; btn.textContent = '提交上报';
      alert('上报失败: ' + err.message);
    });
}

function showToast(msg) {
  const toast = document.createElement('div');
  toast.textContent = msg;
  toast.style.cssText = 'position:fixed;top:80px;left:50%;transform:translateX(-50%);background:rgba(74,222,128,0.95);color:#fff;padding:12px 24px;border-radius:999px;font-size:14px;font-weight:600;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,0.3)';
  document.body.appendChild(toast);
  setTimeout(() => { toast.style.opacity = '0'; toast.style.transition = 'opacity .4s'; }, 2000);
  setTimeout(() => toast.remove(), 2500);
}

// ===== 暴雨应急：议程应急联动 =====
function getNextFavoriteEvent() {
  if (favorites.size === 0) return null;
  const now = new Date();
  const favEvents = events.filter(e => favorites.has(e.id)).map(e => {
    const dateStr = e.date.replace('月', '/').replace('日', '');
    const parts = dateStr.split('/');
    const [hh, mm] = (e.time_start || '0:0').split(':').map(Number);
    const evDate = new Date(2026, parts[0] - 1, parts[1], hh, mm);
    return { event: e, date: evDate, minutesUntil: Math.round((evDate - now) / 60000) };
  }).filter(x => x.minutesUntil > -60)
    .sort((a, b) => a.minutesUntil - b.minutesUntil);
  return favEvents[0] || null;
}

function renderAgendaAlert() {
  const card = document.getElementById('agendaAlertCard');
  if (!card) return;
  const next = getNextFavoriteEvent();
  if (!next) { card.style.display = 'none'; return; }
  card.style.display = 'block';
  const ev = next.event;
  document.getElementById('agendaAlertEvent').textContent = ev.name_cn;
  let timeText = ev.date + ' ' + ev.time_start + ' - ' + ev.time_end + ' · ' + (ev.venue || '');
  if (next.minutesUntil > 0) {
    const h = Math.floor(next.minutesUntil / 60);
    const m = next.minutesUntil % 60;
    timeText += ' · 还有' + (h > 0 ? h + '小时' : '') + (m > 0 ? m + '分钟' : '') + '开始';
  } else {
    timeText += ' · 进行中';
  }
  document.getElementById('agendaAlertTime').textContent = timeText;
  document.getElementById('agendaAlertSuggestion').textContent = calculateDepartureSuggestion(next, currentWarningLevel);
  card.classList.toggle('warn', currentWarningLevel === 'ORANGE' || currentWarningLevel === 'RED');
}

function calculateDepartureSuggestion(next, warningLevel) {
  if (next.minutesUntil <= 0) return '该论坛已开始，可前往' + (next.event.venue || '场馆');
  if (!warningLevel || warningLevel === 'BLUE') return '当前无暴雨预警，建议提前 15 分钟出发前往' + (next.event.venue || '场馆');
  if (warningLevel === 'YELLOW') return '暴雨黄色预警，路面湿滑，建议提前 30 分钟出发，注意步行安全';
  if (warningLevel === 'ORANGE') return '暴雨橙色预警，建议提前 45 分钟出发，避开低洼路段，优先选择地铁';
  if (warningLevel === 'RED') return '暴雨红色预警，建议推迟前往或改用地铁出行，避免涉水路段';
  return '建议提前出发';
}

function loadShelters() {
  fetch('/public/shelters.json')
    .then(r => r.json())
    .then(data => {
      if (!leafletMap || !data) return;
      data.forEach(s => {
        const icon = L.divIcon({
          className: 'custom-pin',
          html: '<div style="width:22px;height:22px;border-radius:50%;background:#4ade80;border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;font-size:9px;color:#062">避</div>',
          iconSize: [22, 22], iconAnchor: [11, 11]
        });
        L.marker([s.lat, s.lng], { icon }).addTo(leafletMap)
          .bindPopup('<div style="min-width:160px"><div style="font-size:13px;font-weight:700;color:#4ade80">' + escapeHtml(s.name) + '</div><div style="font-size:11px;color:#8b95a8;margin-top:4px">' + escapeHtml(s.address || s.type || '') + '</div></div>');
      });
    })
    .catch(err => { console.warn('加载避雨点失败:', err); });
}

// ===== INIT =====
function init() {
  // 暴雨应急：启动预警轮询 + 积水加载 + 议程联动
  startWarningPolling();
  loadWaterloggingReports();
  renderAgendaAlert();
  setInterval(renderAgendaAlert, 60000);
  // Nav buttons
  document.querySelectorAll('.nav-btn').forEach(btn => {
    btn.addEventListener('click', () => switchView(btn.dataset.view));
  });

  // Date filters
  document.querySelectorAll('.filter-pill').forEach(pill => {
    pill.addEventListener('click', () => {
      document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
      pill.classList.add('active');
      currentDateFilter = pill.dataset.date;
      if(currentView === 'timeline') renderTimeline();
    });
  });

  // Search
  let searchTimer;
  document.getElementById('searchInput').addEventListener('input', (e) => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => {
      searchQuery = e.target.value.trim();
      if(currentView === 'timeline') renderTimeline();
      else switchView('timeline');
    }, 250);
  });

  // Modal close
  document.getElementById('eventModal').addEventListener('click', (e) => {
    if(e.target.id === 'eventModal') closeModal();
  });
  document.addEventListener('keydown', (e) => {
    if(e.key === 'Escape') closeModal();
  });

  // Initial render
  updateTrackFilters();
  renderTimeline();
  updateFavBadge();
}

init();
